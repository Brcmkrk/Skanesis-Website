services:
  # 1. Backend API (Python/Flask)
  - type: web
    name: skanesis-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "backend.main:create_app()"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 5000

  # 2. Frontend (Static Site)
  - type: web
    name: skanesis-ui
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /api/*
        # Once deployed, change this to your backend URL if relative calls fail
        destination: https://skanesis-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
